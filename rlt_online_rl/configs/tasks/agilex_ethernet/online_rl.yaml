experiment:
  rl:
    action_dim: 7
    chunk_len: 10
    z_dim: 2048
    proprio_dim: 7
    action_representation: delta_chunk
    action_norm_stats_path: stats/norm_stats_delta.json

    gamma: 0.99
    fixed_std: 0.002
    reference_dropout_prob: 0.5
    delta_weight: 10.0
    warmup_bc_weight: 10.0
    warmup_q_weight: 0.1
    online_bc_weight: 5.0
    online_q_weight: 0.1

    actor_hidden_dim: 256
    actor_num_layers: 2
    critic_hidden_dim: 256
    critic_num_layers: 2

    actor_lr: 1e-4
    critic_lr: 1e-4
    target_tau: 0.005
    actor_update_period: 2

    warmup_min_size: 600
    warmup_post_collect_updates: 20000
    freeze_after_warmup: false
    grad_updates_per_cycle: 5

runtime:
  role: all
  local_debug_mode: false

  monitoring:
    enable_wandb: true
    wandb_project: rlt-online-rl
    wandb_entity: null
    wandb_mode: offline
    wandb_run_name: agilex_ethernet
    wandb_dir: ./wandb

  actor_service:
    pull_params_interval_sec: 0.25
    rpc_timeout_sec: 0.2
    bind_host: 127.0.0.1
    port: 9101
    snapshot_path: ./runs/agilex_ethernet/actor_snapshot/actor_snapshot.pkl
    xla_mem_fraction: 0.10
    xla_preallocate: false

  learner_service:
    push_actor_interval_steps: 500
    checkpoint_interval_steps: 1000
    sample_batch_size: 128
    checkpoint_dir: ./runs/agilex_ethernet/checkpoints
    actor_snapshot_path: ./runs/agilex_ethernet/actor_snapshot/actor_snapshot.pkl
    replay_url: http://127.0.0.1:9102
    poll_interval_sec: 0.01
    xla_mem_fraction: 0.75
    xla_preallocate: false

  replay:
    capacity: 200000
    journal_path: ./runs/agilex_ethernet/replay/replay_journal.pkl
    bind_host: 127.0.0.1
    port: 9102
    seed: 0

  env_driver:
    machine_a_ws_url: ws://MACHINE_A_IP:8000
    actor_service_url: http://127.0.0.1:9101
    replay_service_url: http://127.0.0.1:9102
    task_mode: critical_phase
    episode_start_control_mode: policy
    full_task_reset_action: [0.00647517, -0.01509710, 0.02923426, 0.00956440, 0.09037315, 0.01089085, 0.09599978]
    critical_phase_reset_action: [0.18784978739210226, 1.2123580583125149, -0.9000662952532484, 0.2818183143194532, -0.18111281647940586, -0.31895892080188315, 0.00470703858137131]
    actor_deterministic: false
    chunk_exec_horizon: 10
    control_frequency_hz: 20.0
    step_trace_stride: 0
    replay_feature_batch_size: 16
    enable_human_override: false
    safe_fallback_to_ref: true
    machine_a_connect_timeout_sec: 5.0
    machine_a_recv_timeout_sec: 5.0
    machine_a_retry_interval_sec: 0.5
    actor_request_timeout_sec: 2.0
    replay_request_timeout_sec: 30.0
