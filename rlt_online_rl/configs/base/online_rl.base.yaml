experiment:
  rl:
    action_dim: 7
    chunk_len: 10
    z_dim: 2048
    proprio_dim: 32

    gamma: 0.99
    fixed_std: 0.05
    reference_dropout_prob: 0.5
    delta_weight: 0.0

    actor_hidden_dim: 256
    actor_num_layers: 2
    critic_hidden_dim: 256
    critic_num_layers: 2

    actor_lr: 0.0003
    critic_lr: 0.0003
    target_tau: 0.005
    actor_update_period: 2

    warmup_min_size: 1000
    warmup_post_collect_updates: null
    freeze_after_warmup: false
    grad_updates_per_cycle: 5
